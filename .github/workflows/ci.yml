name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  no-network-audit:
    name: No HTTP crates (security §4.7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: bash scripts/check-no-http.sh

  build-and-test:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl \
            wget file libxdo-dev libssl-dev libgtk-3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/envvault-app/ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: crates/envvault-app/ui
        run: npm ci

      - name: Ensure frontendDist exists for codegen
        shell: bash
        run: mkdir -p crates/envvault-app/ui/dist && touch crates/envvault-app/ui/dist/index.html

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Clippy (zero warnings allowed)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Rust tests
        run: cargo test --workspace --locked

      - name: Frontend build (bindings + tsc --noEmit + vite)
        working-directory: crates/envvault-app/ui
        run: npm run build

      - name: Verify committed bindings are up to date
        shell: bash
        run: git diff --exit-code crates/envvault-app/ui/src/bindings.ts
